framework:
    rate_limiter:
        # Module heartbeat endpoint. Legitimate shops call this at most once per
        # day (throttled client-side), so a generous per-IP ceiling only ever bites
        # abuse / id-enumeration attempts, never a real merchant.
        license_status:
            policy: 'sliding_window'
            limit: 60
            interval: '1 minute'
        # API gateway (/api/v1). Per-IP brute-force / key-enumeration guard, not a
        # per-license quota (that is metered separately in api_usage). Sized to sit
        # above a busy shop's autocomplete traffic while still capping abuse.
        gateway_api:
            policy: 'sliding_window'
            limit: 120
            interval: '1 minute'
        # Public module download. A human grabs the zip a handful of times at
        # most, so this per-IP ceiling only ever bites a client hammering the
        # link. The apex is origin-direct (no Cloudflare in front), so the key
        # is the real visitor IP rather than a shared proxy address.
        download:
            policy: 'sliding_window'
            limit: 20
            interval: '10 minutes'

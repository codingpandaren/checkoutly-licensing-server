# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Note that the session will be started ONLY if you read or write from it.
    session: true

    #esi: true
    #fragments: true

when@prod:
    framework:
        session:
            # Sign in with Apple returns via a cross-site POST; a SameSite=Lax
            # cookie is not sent on it, so the OAuth state (kept in the session)
            # would be lost. None+Secure lets the session ride the callback.
            # Safe here: prod is HTTPS-only and state-changing forms are protected
            # by Symfony CSRF tokens. Only applied in prod so local HTTP dev keeps
            # a Lax (Secure-free) cookie that browsers accept.
            cookie_samesite: none
            cookie_secure: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file

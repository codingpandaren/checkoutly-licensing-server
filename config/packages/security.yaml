security:
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            entry_point: App\Security\LoginEntryPoint
            custom_authenticators:
                - App\Security\GoogleAuthenticator
                - App\Security\FacebookAuthenticator
            logout:
                path: app_logout
                target: app_login

    # Note: Only the *first* matching rule is applied
    access_control:
        # Public: login page + OAuth connect/callback routes
        - { path: ^/(login|connect), roles: PUBLIC_ACCESS }
        # Public machine endpoints: module heartbeat + Stripe webhook (own auth)
        - { path: ^/api, roles: PUBLIC_ACCESS }
        - { path: ^/webhook, roles: PUBLIC_ACCESS }
        # Operator console
        - { path: ^/admin, roles: ROLE_ADMIN }
        # Everything else (the customer portal) requires a logged-in user
        - { path: ^/, roles: ROLE_USER }
